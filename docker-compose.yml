services:
  postgres:
    image: postgres:16
    container_name: gamesense_postgres
    environment:
      POSTGRES_USER: gamesense
      POSTGRES_PASSWORD: gamesense
      POSTGRES_DB: gamesense
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gamesense_redis
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    container_name: gamesense_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data: